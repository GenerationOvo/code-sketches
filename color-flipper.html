<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web dev - color flipper</title>
    <style>
        body{
            font-family: system-ui;
        }
    </style>
</head>
<body>
    
    <h1>We can flipping the colors!</h1>

    <button onClick="setColor('Papayawhip')">Papaya-Whip</button>
    <button onClick="setColor('Peachpuff')">Peach Puff</button>
    <button onClick="setColor('powderblue')">Powder Blue</button>

    <br><br>

     <button onClick="randomColor()">Random Color</button>

    <script>
        const body = document.body;

        setColor("#DDD");

        function setColor(name) {
            body.style.backgroundColor = name;
        }

        function randomColor(){
            let R = Math.round(Math.random() * 255);
            let G = Math.round(Math.random() * 255);
            let B = Math.round(Math.random() * 255);
            body.style.backgroundColor = `rgb(${R}, ${G}, ${B})`;

            if( R+G+B /3 < 350){
                body.style.color = "white";
            } else {
                body.style.color = "black";
            }
        }
    </script>

</body>
</html>
